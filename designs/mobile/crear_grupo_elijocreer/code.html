<body class="bg-background text-on-background min-h-screen">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-background shadow-sm w-full top-0 sticky z-50">
<div class="flex justify-between items-center px-container-padding h-16 w-full max-w-[480px] mx-auto">
<button aria-label="Volver" class="text-primary dark:text-primary-fixed-dim hover:bg-surface-container-low transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile text-primary dark:text-primary-fixed-dim font-bold font-montserrat">Crear Grupo</h1>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container">
<img alt="User profile photo" class="w-full h-full object-cover" data-alt="A professional studio portrait of a sports fan wearing a premium navy blue jersey, looking confident and smiling. The lighting is high-key and clean, against a minimalist soft grey background that fits a high-end corporate athletic dashboard aesthetic with Sky Blue accents." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDFTDLMmrHtfrzvyN7JhbR2Qbf5qbsxgOZP__tZg854Cj_plnApe6N3uOZAlBr-tHfBkStowK0X3D5e7FimzoCKX8MZStttycumWbGqWjm4CtomGiKTW4Fgbs6sTL1vmfvLw4-nUcJjUKZQEYbT-xWETQm0PiVfvk1wW7-dCp82DByGUq6SRuFu5DMdK0mQMUc1p_ZjZi1uwFKlB54RkiRT-YMjunbraGk5eGFBSeazRfscprIfoAjrgGx1pT9qmkjXwNn1RaBy5_M"/>
</div>
</div>
</header>
<main class="max-w-[480px] mx-auto px-container-padding pt-8 pb-32">
<!-- Header Illustration/Atmosphere -->
<div class="relative w-full h-40 mb-8 rounded-xl overflow-hidden shadow-sm">
<img class="w-full h-full object-cover opacity-80" data-alt="An expansive, high-angle view of a majestic football stadium at dusk, with glowing stadium lights casting a dramatic Sky Blue and Deep Navy hue across the pitch. The scene is clean and editorial, emphasizing the grandeur of a world-class sports venue with a sense of championship quality and professional prestige." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBg0LpIFv3Y50kTtPjftJ_-3cxMf6s0VS05Xm5AogvNL9zDoLOdUdKJLpQf_1QWOTd9CEmKiEkF5qcs9GMtBjMkFW-1IJWT-d4Y9cTECeK9SvUX96v5cLsUboK3gvGLCjPsuA2XBdu5-kNworsnCmdFtIhdscs8USRuH63SzUM-7tHfb7xjUxsmU9qzfvxcnOfWOuBhQjGUBLE___W5eWy1ZtEP1E16Z14GhhI8Q8Dge0Qb9Jp1DeTUQSMIGADZzG2csw5IojYMD_E"/>
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent"></div>
<div class="absolute bottom-4 left-4">
<p class="font-headline-md text-headline-md text-on-surface font-bold font-montserrat">Armá tu comunidad</p>
<p class="font-body-md text-on-surface-variant">Competí con amigos y colegas</p>
</div>
</div>
<!-- Form Section -->
<form class="space-y-6" id="createGroupForm">
<!-- Group Name -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant font-bold font-montserrat uppercase tracking-wider" for="groupName">Nombre del grupo</label>
<input class="w-full bg-surface-container-lowest border-2 border-outline-variant focus:border-primary focus:ring-0 rounded-xl px-4 py-3 text-body-lg font-montserrat transition-all outline-none" id="groupName" placeholder="Ej: Los Pibes del Qatar" required="" type="text"/>
</div>
<!-- Description -->
<div class="space-y-2">
<div class="flex justify-between">
<label class="font-label-md text-label-md text-on-surface-variant font-bold font-montserrat uppercase tracking-wider" for="description">Descripción</label>
<span class="text-label-sm text-outline">(Opcional)</span>
</div>
<textarea class="w-full bg-surface-container-lowest border-2 border-outline-variant focus:border-primary focus:ring-0 rounded-xl px-4 py-3 text-body-md font-montserrat transition-all outline-none resize-none" id="description" placeholder="Escribe algo sobre este grupo..." rows="3"></textarea>
</div>
<!-- Privacy Selector -->
<div class="space-y-3">
<label class="font-label-md text-label-md text-on-surface-variant font-bold font-montserrat uppercase tracking-wider">Privacidad</label>
<div class="grid grid-cols-2 gap-4">
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="privacy" type="radio" value="public"/>
<div class="p-4 rounded-xl border-2 border-outline-variant bg-surface-container-lowest peer-checked:border-primary peer-checked:bg-primary-container/10 transition-all flex flex-col items-center text-center gap-2 group-hover:border-primary-container">
<span class="material-symbols-outlined text-primary" data-icon="public">public</span>
<span class="font-label-md font-bold text-primary font-montserrat">Público</span>
<span class="text-[10px] text-outline font-body-md leading-tight">Cualquiera puede unirse</span>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="privacy" type="radio" value="private"/>
<div class="p-4 rounded-xl border-2 border-outline-variant bg-surface-container-lowest peer-checked:border-primary peer-checked:bg-primary-container/10 transition-all flex flex-col items-center text-center gap-2 group-hover:border-primary-container">
<span class="material-symbols-outlined text-primary" data-icon="lock">lock</span>
<span class="font-label-md font-bold text-primary font-montserrat">Privado</span>
<span class="text-[10px] text-outline font-body-md leading-tight">Solo con invitación</span>
</div>
</label>
</div>
</div>
<!-- Invitation Code -->
<div class="bg-surface-container-high rounded-xl p-6 border-l-4 border-primary shadow-sm space-y-3">
<div class="flex items-center justify-between">
<span class="font-label-md text-on-surface-variant font-bold font-montserrat uppercase tracking-wider">Código de Invitación</span>
<span class="material-symbols-outlined text-primary text-sm animate-pulse" data-icon="info" style="font-variation-settings: 'FILL' 1;">info</span>
</div>
<div class="flex items-center gap-3">
<div class="bg-surface-container-lowest border-2 border-primary-container rounded-lg px-4 py-3 flex-1 flex justify-center items-center shadow-inner">
<span class="text-headline-md font-extrabold font-montserrat tracking-[0.2em] text-primary" id="inviteCode">ARG-2026-X</span>
</div>
<button class="bg-primary-container text-on-primary-container p-3 rounded-lg hover:opacity-80 active:scale-90 transition-all" onclick="regenerateCode()" title="Regenerar código" type="button">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
</button>
</div>
<p class="text-label-sm text-on-surface-variant opacity-70 italic">Este código se genera automáticamente para tu grupo.</p>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-on-primary-container text-white py-4 rounded-xl font-headline-md font-montserrat shadow-lg hover:shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
<span>Crear Grupo</span>
<span class="material-symbols-outlined" data-icon="group_add">group_add</span>
</button>
</div>
</form>
</main>
<!-- Bottom Navigation (Shared Component Logic) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-surface dark:bg-background shadow-[0_-4px_12px_rgba(35,99,145,0.1)] max-w-[480px] left-1/2 -translate-x-1/2 rounded-t-xl">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline opacity-70 hover:opacity-100 active:scale-90 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="sports_soccer">sports_soccer</span>
<span class="font-label-sm text-label-sm font-montserrat">Matches</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline opacity-70 hover:opacity-100 active:scale-90 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-label-sm text-label-sm font-montserrat">Leagues</span>
</a>
<a class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim font-bold scale-110 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="group" style="font-variation-settings: 'FILL' 1;">group</span>
<span class="font-label-sm text-label-sm font-montserrat">Social</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline opacity-70 hover:opacity-100 active:scale-90 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-sm text-label-sm font-montserrat">Profile</span>
</a>
</nav>
<script>
        function regenerateCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = 'ARG-';
            for (let i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('inviteCode').innerText = result;
            
            // Subtle feedback
            const codeContainer = document.getElementById('inviteCode').parentElement;
            codeContainer.classList.add('scale-105', 'border-primary');
            setTimeout(() => {
                codeContainer.classList.remove('scale-105', 'border-primary');
            }, 200);
        }

        // Form submission logic
        document.getElementById('createGroupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Generando grupo...';
            
            setTimeout(() => {
                alert('¡Grupo "' + document.getElementById('groupName').value + '" creado con éxito!');
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }, 1500);
        });

        // Initialize with a random code
        window.onload = regenerateCode;
    </script>
</body></html>
