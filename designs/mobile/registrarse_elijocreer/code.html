<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>

                    "primary": "#236391",
                    "tertiary": "#735c00",
                    "primary-container": "#74acdf",
                    "on-background": "#191c1e",
                    "surface-container": "#eceef0",
                    "secondary-fixed": "#d2e4ff",
                    "inverse-primary": "#96ccff",
                    "tertiary-fixed-dim": "#e9c349",
                    "surface": "#f7f9fb",

<style>
        body {
            background-color: #f7f9fb;
            color: #191c1e;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .form-input-focus:focus {
            outline: none;
            border-color: #236391;
            box-shadow: 0 0 0 3px rgba(35, 99, 145, 0.1);
        }
        .signup-card {
            box-shadow: 0 4px 20px rgba(35, 99, 145, 0.08);
        }
        .step-transition {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pulse-soft {
            animation: pulse-light 2s infinite;
        }
        @keyframes pulse-light {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- Top Navigation (Shell suppressed for Transactional flow, but branding remains) -->
<header class="w-full top-0 sticky bg-surface shadow-sm z-50">
<div class="flex justify-center items-center px-container-padding h-16 w-full max-w-[480px] mx-auto">
<h1 class="font-headline-md text-headline-md text-primary font-bold tracking-tight">ElijoCreer</h1>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-container-padding pb-12 w-full max-w-[480px] mx-auto overflow-hidden relative">
<!-- Step 1: Sign Up Form -->
<section class="step-transition w-full flex flex-col opacity-100 translate-x-0" id="step-signup">
<div class="text-center mb-section-margin">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Unite a la comunidad futbolera más grande</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Preparate para el Mundial 2026 con los mejores pronósticos.</p>
</div>
<div class="signup-card bg-surface-container-lowest p-6 rounded-xl w-full border border-surface-container-highest">
<form class="space-y-5" id="registrationForm" onsubmit="handleSignup(event)">
<div>
<label class="font-label-md text-label-md text-on-surface mb-2 block" for="name">Nombre completo</label>
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface-bright font-body-md text-body-md form-input-focus transition-all" id="name" placeholder="Tu nombre" required="" type="text"/>
</div>
<div>
<label class="font-label-md text-label-md text-on-surface mb-2 block" for="email">Correo electrónico</label>
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface-bright font-body-md text-body-md form-input-focus transition-all" id="email" placeholder="nombre@ejemplo.com" required="" type="email"/>
</div>
<div>
<label class="font-label-md text-label-md text-on-surface mb-2 block" for="password">Contraseña</label>
<input class="w-full px-4 py-3 rounded-lg border border-outline-variant bg-surface-bright font-body-md text-body-md form-input-focus transition-all" id="password" placeholder="Min. 8 caracteres" required="" type="password"/>
</div>
<button class="w-full py-4 bg-primary text-on-primary font-headline-md text-headline-md rounded-lg shadow-md active:scale-95 transition-all duration-200 mt-4" type="submit">
                        Crear mi cuenta
                    </button>
</form>
<div class="mt-8 flex flex-col items-center gap-4">
<button class="font-label-md text-label-md text-primary hover:underline transition-all">
                        Ya tengo cuenta
                    </button>
</div>
</div>
<div class="mt-section-margin relative h-48 w-full rounded-xl overflow-hidden shadow-lg border border-surface-container-highest">
<img class="w-full h-full object-cover grayscale-[20%] brightness-90" data-alt="A high-angle cinematic shot of a modern, brightly lit soccer stadium filled with a cheering crowd under a sunset sky. The lighting is warm and golden, reflecting off the lush green grass of the pitch. The aesthetic is clean, professional, and captures the excitement of a global championship. The atmosphere is energetic yet premium, aligning with the ElijoCreer brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCB--NSyaVNvHOzGCImj-Vis-7neoTarm5PrH0H5ty-Nt9EJlEk2gmQpzOE3--EmSuuZfkvjDTWhMALLZPA3kTjftKjrCj91voLEwBwbLZb55q2UKtcLz887gWEXp3jZ7VTLewZWcqHsC81RgrFXidW-sAcvy0HwMOYXTVK3BVlQ2wzfIEywOGcnQuTupjkC-MsETF7EKvALZsnOh0awecfWqDst_tXYfxz-rdMDAMcybWNDJexTQ6wxG63aNcYQH-8BUE8bUupFiU"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex items-end p-6">
<span class="text-white font-headline-md text-headline-md">Siente la pasión del 2026</span>
</div>
</div>
</section>
<!-- Step 2: Post-Signup Focus (Hidden by default) -->
<section class="step-transition fixed inset-0 flex flex-col items-center justify-center px-container-padding bg-surface pointer-events-none opacity-0 translate-x-12" id="step-onboarding">
<div class="w-full max-w-[400px] text-center">
<div class="w-20 h-20 bg-primary-container rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
<span class="material-symbols-outlined text-on-primary-container text-4xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">¡Bienvenido al equipo!</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-section-margin">Tu cuenta ha sido creada. Ahora, ¿cómo quieres empezar tu camino a la gloria?</p>
<div class="grid grid-cols-1 gap-4 w-full">
<!-- Create Group Action -->
<button class="group flex items-center p-5 bg-surface-container-lowest border border-surface-container-highest rounded-xl shadow-sm hover:shadow-md hover:border-primary transition-all text-left">
<div class="w-12 h-12 bg-tertiary-container rounded-lg flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">groups</span>
</div>
<div class="flex-grow">
<h3 class="font-headline-md text-headline-md text-on-surface group-hover:text-primary transition-colors">Crear Grupo</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">Armá tu propia liga con amigos.</p>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
<!-- Join Group Action -->
<button class="group flex items-center p-5 bg-surface-container-lowest border border-surface-container-highest rounded-xl shadow-sm hover:shadow-md hover:border-primary transition-all text-left">
<div class="w-12 h-12 bg-secondary-container rounded-lg flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-on-secondary-container" style="font-variation-settings: 'FILL' 1;">person_add</span>
</div>
<div class="flex-grow">
<h3 class="font-headline-md text-headline-md text-on-surface group-hover:text-primary transition-colors">Unirme a un Grupo</h3>
<p class="font-label-sm text-label-sm text-on-surface-variant">Ingresá con un código de invitación.</p>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
</div>
<div class="mt-8">
<button class="font-label-md text-label-md text-outline hover:text-on-surface transition-colors" onclick="skipOnboarding()">
                        Explorar la app primero
                    </button>
</div>
</div>
</section>
</main>
<!-- Success Toast (Hidden) -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-inverse-surface text-inverse-on-surface px-6 py-3 rounded-full font-label-md text-label-md shadow-2xl opacity-0 translate-y-10 transition-all duration-300 z-[100] flex items-center gap-3" id="toast">
<span class="material-symbols-outlined text-primary-fixed-dim">verified</span>
<span>¡Cuenta creada con éxito!</span>
</div>
<script>
        function handleSignup(event) {
            event.preventDefault();
            
            const signupSection = document.getElementById('step-signup');
            const onboardingSection = document.getElementById('step-onboarding');
            const toast = document.getElementById('toast');

            // Visual feedback - Show toast
            toast.classList.remove('opacity-0', 'translate-y-10');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                // Transition screens
                signupSection.classList.add('opacity-0', '-translate-x-12');
                signupSection.classList.remove('opacity-100', 'translate-x-0');
                
                setTimeout(() => {
                    signupSection.classList.add('hidden');
                    onboardingSection.classList.remove('pointer-events-none', 'opacity-0', 'translate-x-12');
                    onboardingSection.classList.add('opacity-100', 'translate-x-0');
                    onboardingSection.classList.remove('fixed');
                    onboardingSection.classList.add('relative');
                    
                    // Hide toast
                    toast.classList.add('opacity-0', 'translate-y-10');
                    toast.classList.remove('opacity-100', 'translate-y-0');
                }, 400);
            }, 800);
        }

        function skipOnboarding() {
            // Placeholder for navigation to dashboard
            alert("Redirigiendo al Dashboard...");
        }

        // Micro-interactions for inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.remove('text-primary');
            });
        });
    </script>
</body></html>
