<header class="flex flex-col items-center gap-2">

<p class="font-body-md text-on-surface-variant text-center opacity-80">Únete a la pasión del 2026</p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-4">
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="email">Email</label>
<div class="relative flex items-center group input-focus-ring rounded-lg border border-outline-variant bg-surface-container-low transition-all">

<input class="w-full bg-transparent border-none focus:ring-0 py-3 pl-10 pr-4 text-on-surface placeholder:text-outline/50" id="email" placeholder="tu@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Olvidé mi contraseña</a>
</div>
<div class="relative flex items-center group input-focus-ring rounded-lg border border-outline-variant bg-surface-container-low transition-all">
<span class="material-symbols-outlined absolute left-3 text-outline group-focus-within:text-primary" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 py-3 pl-10 pr-12 text-on-surface placeholder:text-outline/50" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<!-- Main CTA -->
<button class="btn-gradient w-full py-4 rounded-xl text-on-primary font-headline-md text-headline-md shadow-md active:scale-[0.98] transition-transform duration-200" type="submit">
                    Iniciar Sesión
                </button>
</form>

<div class="flex items-center gap-4">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-widest">O continúa con</span>

<!-- Micro-interaction script -->
<script>
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('border-primary');
                input.parentElement.classList.remove('border-outline-variant');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('border-primary');
                input.parentElement.classList.add('border-outline-variant');
            });
        });
        
        // Simple password toggle logic
        const toggleBtn = document.querySelector('button[type="button"]');
        const passInput = document.querySelector('input[type="password"]');
        if(toggleBtn && passInput) {
            toggleBtn.addEventListener('click', () => {
                const isPass = passInput.type === 'password';
                passInput.type = isPass ? 'text' : 'password';
                toggleBtn.querySelector('span').innerText = isPass ? 'visibility_off' : 'visibility';
            });
        }
    </script>
